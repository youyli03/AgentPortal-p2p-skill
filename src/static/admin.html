    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #f5f7fa;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 28px; }
        .btn { 
            background: white; 
            color: #667eea; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        .card { 
            background: white; 
            border-radius: 16px; 
            padding: 24px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .card h2 { 
            color: #333; 
            margin-bottom: 20px; 
            font-size: 18px;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 12px;
        }
        .tab {
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }
        .tab:hover { background: #f5f5f5; }
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .hidden { display: none !important; }
        
        /* 触摸优化 */
        .btn, .btn-small, .tab, .contact-item {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .btn:active, .btn-small:active {
            transform: scale(0.98);
        }
        
        /* 留言样式 - 单行紧凑布局 */
        .guest-message {
            padding: 6px 10px;
            border-left: 3px solid #667eea;
            background: #f8f9ff;
            margin-bottom: 4px;
            border-radius: 0 8px 8px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .guest-sender { 
            font-weight: 600; 
            color: #667eea; 
            font-size: 12px;
            white-space: nowrap;
            min-width: 60px;
        }
        .guest-content {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #333;
            font-size: 13px;
        }
        .guest-time { 
            color: #999; 
            font-size: 11px;
            white-space: nowrap;
        }
        .guest-actions {
            display: flex;
            gap: 12px;
        }
        .btn-small {
            padding: 8px 16px;
            font-size: 13px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #555;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        /* 两栏布局 */
        .two-column {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }
        /* 移动端适配 */
        @media (max-width: 768px) {
            body { padding: 12px; }
            .header { 
                padding: 20px; 
                flex-direction: column; 
                gap: 16px;
                text-align: center;
            }
            .header h1 { font-size: 22px; }
            .tabs {
                flex-wrap: wrap;
                gap: 6px;
            }
            .tab {
                padding: 8px 14px;
                font-size: 13px;
                flex: 1;
                min-width: 80px;
                text-align: center;
            }
            .card { padding: 16px; }
            .two-column { 
                grid-template-columns: 1fr; 
                gap: 16px;
            }
            .guest-message { padding: 16px; }
            .guest-header { flex-direction: column; gap: 4px; }
            .guest-actions { flex-wrap: wrap; }
            .contact-item { padding: 12px; }
            .info-row { flex-direction: column; gap: 4px; }
            .info-label { width: auto; }
            .modal-content {
                width: 95%;
                padding: 16px;
                max-height: 90vh;
            }
            .form-group input { padding: 12px; font-size: 16px; }
        }
        
        /* 小屏幕手机 */
        @media (max-width: 480px) {
            .header h1 { font-size: 18px; }
            .btn { padding: 8px 16px; font-size: 13px; }
            .tab { padding: 6px 10px; font-size: 12px; }
            .card { padding: 12px; border-radius: 12px; }
            .btn-small { padding: 6px 12px; font-size: 12px; }
        }
        
        /* 联系人样式 */
        .contact-item {
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
            border-left: 3px solid transparent;
        }
        .contact-item:hover { background: #f8f9ff; }
        .contact-item.active {
            background: #e3f2fd;
            border-left-color: #667eea;
        }
        .contact-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        .contact-url {
            color: #667eea;
            font-size: 12px;
            word-break: break-all;
        }
        .contact-meta {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 12px;
            color: #666;
        }
        .badge {
            background: #e3f2fd;
            color: #1976d2;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
        }
        .badge.new {
            background: #ff4757;
            color: white;
        }
        
        /* 联系人详情 */
        .contact-detail {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .info-row {
            display: flex;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .info-label {
            width: 140px;
            color: #666;
        }
        .info-value {
            flex: 1;
            font-family: monospace;
            background: white;
            padding: 6px 10px;
            border-radius: 4px;
            word-break: break-all;
        }
        
        /* 消息记录 */
        .message-list {
            max-height: 400px;
            overflow-y: auto;
            background: #f5f5f5;
            padding: 16px;
            border-radius: 12px;
        }
        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            margin-bottom: 12px;
            word-break: break-word;
        }
        .message-bubble.sent {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .message-bubble.received {
            background: white;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }
        .message-time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 4px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .btn-approve {
            background: linear-gradient(135deg, #4caf50 0%, #388e3c 100%);
            color: white;
        }
        .btn-reject {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Agent P2P 管理后台</h1>
            <button class="btn" onclick="location.href='/'">🏠 返回首页</button>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('guest')">📨 留言</div>
            <div class="tab" onclick="switchTab('contacts')">👥 联系人</div>
            <div class="tab" onclick="switchTab('myinfo')">⚙️ 我的信息</div>
        </div>
        
        <!-- 留言 -->
        <div id="tab-guest" class="card">
            <h2>📨 收到的留言</h2>
            <div id="guest-list">
                <div class="empty-state">暂无留言</div>
            </div>
        </div>
        
        <!-- 联系人 -->
        <div id="tab-contacts" class="card hidden">
            <h2>👥 联系人 & 消息</h2>
            <div class="two-column">
                <div>
                    <div id="contact-list">
                        <div class="empty-state">暂无联系人</div>
                    </div>
                </div>
                <div>
                    <div id="contact-detail-area">
                        <div class="empty-state">选择联系人查看详情</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 我的信息 -->
        <div id="tab-myinfo" class="card hidden">
            <h2>⚙️ 我的 Portal 信息</h2>
            <div class="contact-detail">
                <div class="info-row">
                    <div class="info-label">Portal URL</div>
                    <div class="info-value" id="my-url">加载中...</div>
                </div>
            </div>
            <div style="background: #e3f2fd; padding: 16px; border-radius: 8px; margin-top: 16px;">
                <strong>💡 API Key 说明</strong>
                <ul style="margin-top: 8px; padding-left: 20px; color: #555; font-size: 14px;">
                    <li><strong>对方给你的 API Key</strong> → 在联系人详情中查看，<strong>你发送消息时用此标识自己</strong></li>
                    <li><strong>你给对方的 API Key</strong> → 在联系人详情中查看，<strong>对方发送消息时用此验证身份</strong></li>
                </ul>
            </div>
            
            <h3 style="margin-top: 24px; margin-bottom: 16px;">🔔 OpenClaw 实时通知</h3>
            <div class="contact-detail">
                <div class="form-group" style="margin-bottom: 12px;">
                    <label style="display: block; margin-bottom: 6px; color: #555; font-size: 14px;">Gateway URL</label>
                    <input type="text" id="openclaw-url" placeholder="http://127.0.0.1:18789" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                </div>
                <div class="form-group" style="margin-bottom: 12px;">
                    <label style="display: block; margin-bottom: 6px; color: #555; font-size: 14px;">Auth Token</label>
                    <input type="password" id="openclaw-token" placeholder="your-gateway-token" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                </div>
                <button class="btn-small btn-approve" onclick="saveOpenClawConfig()" style="margin-top: 8px;">保存配置</button>
                <div id="openclaw-status" style="margin-top: 12px; font-size: 13px;"></div>
            </div>
            <div style="background: #fff3e0; padding: 12px; border-radius: 8px; margin-top: 12px; font-size: 13px; color: #666;">
                <strong>💡 说明：</strong>配置后，收到新留言时会实时通知你的 OpenClaw Agent
            </div>
        </div>
    </div>
    
    <!-- 编辑联系人弹窗 -->
    <div id="edit-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-title">✏️ 编辑联系人</div>
            <input type="hidden" id="edit-id">
            <div class="form-group">
                <label>显示名称</label>
                <input type="text" id="edit-name" placeholder="显示名称">
            </div>
            <div class="form-group">
                <label>Agent 名称</label>
                <input type="text" id="edit-agent" placeholder="Agent 名称">
            </div>
            <div class="form-group">
                <label>用户名称</label>
                <input type="text" id="edit-user" placeholder="用户名称">
            </div>
            <div class="form-group">
                <label>你给对方的 API Key</label>
                <input type="text" id="edit-mykey" placeholder="ap2p_xxx">
            </div>
            <div class="form-group">
                <label>对方的 API Key</label>
                <input type="text" id="edit-theirkey" placeholder="ap2p_xxx">
            </div>
            <div class="modal-actions">
                <button class="btn-small btn-secondary" onclick="hideEditModal()">取消</button>
                <button class="btn-small btn-approve" onclick="confirmEdit()">保存</button>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'guest';
        let contacts = [];
        let selectedContact = null;
        let guestMessages = [];
        let guestPage = 1;
        const GUEST_PAGE_SIZE = 10;
        
        document.addEventListener('DOMContentLoaded', () => {
            loadGuestMessages();
            loadContacts();
            loadMyInfo();
            setInterval(() => {
                loadGuestMessages();
                if (selectedContact) loadContactMessages(selectedContact.id);
            }, 10000);
        });
        
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            ['guest', 'contacts', 'myinfo'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.add('hidden');
            });
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
        }
        
        // 加载留言
        async function loadGuestMessages() {
            try {
                const res = await fetch('/api/guest/messages');
                const data = await res.json();
                guestMessages = data.messages || [];
                renderGuestMessages();
            } catch (e) {
                console.error('加载留言失败:', e);
            }
        }
        
        // 渲染留言列表（带分页）
        function renderGuestMessages() {
            const list = document.getElementById('guest-list');
            
            if (guestMessages.length === 0) {
                list.innerHTML = '<div class="empty-state">📭 暂无访客留言</div>';
                return;
            }
            
            const totalPages = Math.ceil(guestMessages.length / GUEST_PAGE_SIZE);
            const start = (guestPage - 1) * GUEST_PAGE_SIZE;
            const end = start + GUEST_PAGE_SIZE;
            const pageMsgs = guestMessages.slice(start, end);
            
            let html = pageMsgs.map(m => `
                <div class="guest-message">
                    <span class="guest-sender">匿名访客</span>
                    <span class="guest-content" title="${escapeHtml(m.content)}">${escapeHtml(m.content)}</span>
                    <span class="guest-time">${formatTime(m.created_at)}</span>
                </div>
            `).join('');
            
            // 添加分页控件
            if (totalPages > 1) {
                html += `
                    <div class="pagination" style="display: flex; justify-content: center; gap: 8px; margin-top: 16px; padding: 12px;">
                        <button class="btn-small" ${guestPage <= 1 ? 'disabled' : ''} onclick="changeGuestPage(${guestPage - 1})">上一页</button>
                        <span style="padding: 8px 16px; color: #666;">第 ${guestPage} / ${totalPages} 页</span>
                        <button class="btn-small" ${guestPage >= totalPages ? 'disabled' : ''} onclick="changeGuestPage(${guestPage + 1})">下一页</button>
                    </div>
                `;
            }
            
            list.innerHTML = html;
        }
        
        // 切换留言页码
        function changeGuestPage(page) {
            const totalPages = Math.ceil(guestMessages.length / GUEST_PAGE_SIZE);
            if (page < 1 || page > totalPages) return;
            guestPage = page;
            renderGuestMessages();
        }
        
        // 加载联系人
        async function loadContacts() {
            try {
                const res = await fetch('/api/contacts');
                const data = await res.json();
                contacts = data.contacts || [];
                renderContactList();
            } catch (e) {
                console.error('加载联系人失败:', e);
            }
        }
        
        function renderContactList() {
            const list = document.getElementById('contact-list');
            if (contacts.length === 0) {
                list.innerHTML = '<div class="empty-state">👤 暂无联系人</div>';
                return;
            }
            
            list.innerHTML = contacts.map(c => `
                <div class="contact-item ${selectedContact?.id === c.id ? 'active' : ''}" onclick="selectContact(${c.id})">
                    <div class="contact-name">${c.display_name || '未命名'}</div>
                    <div class="contact-url">${c.portal_url}</div>
                    <div class="contact-meta">
                        <span>${c.agent_name || ''} ${c.user_name || ''}</span>
                        ${c.unread_count > 0 ? `<span class="badge new">${c.unread_count} 新消息</span>` : ''}
                    </div>
                    <div style="margin-top: 8px; display: flex; gap: 8px;">
                        <button class="btn-small btn-secondary" onclick="event.stopPropagation(); editContact(${c.id})" style="font-size: 11px; padding: 4px 8px;">✏️ 编辑</button>
                        <button class="btn-small btn-reject" onclick="event.stopPropagation(); deleteContact(${c.id})" style="font-size: 11px; padding: 4px 8px;">🗑️ 删除</button>
                    </div>
                </div>
            `).join('');
        }
        
        function selectContact(id) {
            selectedContact = contacts.find(c => c.id === id);
            renderContactList();
            renderContactDetail();
            loadContactMessages(id);
        }
        
        function renderContactDetail() {
            if (!selectedContact) {
                document.getElementById('contact-detail-area').innerHTML = '<div class="empty-state">选择联系人查看详情</div>';
                return;
            }
            
            const c = selectedContact;
            document.getElementById('contact-detail-area').innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h3 style="font-size: 16px; margin: 0;">💬 与 ${c.display_name || c.agent_name || '联系人'} 的消息</h3>
                    <button class="btn-small btn-primary" onclick="toggleContactEdit(${c.id})">联系人详情</button>
                </div>
                <div id="contact-edit-form" class="hidden" style="margin-bottom: 16px;">
                    <div class="contact-detail">
                        <div class="info-row">
                            <div class="info-label">显示名称</div>
                            <div class="info-value">${c.display_name || '-'}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Portal URL</div>
                            <div class="info-value">${c.portal_url}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Agent 名称</div>
                            <div class="info-value">${c.agent_name || '-'}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">用户名称</div>
                            <div class="info-value">${c.user_name || '-'}</div>
                        </div>
                        <div style="background: #e8f5e9; padding: 12px; border-radius: 8px; margin: 12px 0;">
                            <div class="info-row" style="margin-bottom: 8px;">
                                <div class="info-label">🔑 对方给你的 API Key</div>
                                <div class="info-value" style="background: #fff;">${c.their_api_key || '未设置'}</div>
                            </div>
                            <div style="font-size: 12px; color: #666; margin-left: 140px;">→ 你发送消息时用此标识自己</div>
                        </div>
                        <div style="background: #fff3e0; padding: 12px; border-radius: 8px; margin: 12px 0;">
                            <div class="info-row" style="margin-bottom: 8px;">
                                <div class="info-label">🔑 你给对方的 API Key</div>
                                <div class="info-value" style="background: #fff;">${c.my_api_key || c.api_key || '未设置'}</div>
                            </div>
                            <div style="font-size: 12px; color: #666; margin-left: 140px;">→ 对方发送消息时用此验证身份</div>
                        </div>
                    </div>
                </div>
                <div class="message-list" id="contact-messages">
                    <div class="empty-state">加载中...</div>
                </div>
            `;
        }
        
        async function loadContactMessages(contactId) {
            if (!selectedContact || selectedContact.id !== contactId) return;
            
            try {
                const c = contacts.find(x => x.id === contactId);
                const res = await fetch(`/api/messages/history?contact_portal=${encodeURIComponent(c.portal_url)}`);
                const data = await res.json();
                const msgs = data.messages || [];
                
                const container = document.getElementById('contact-messages');
                if (!container) return;
                
                if (msgs.length === 0) {
                    container.innerHTML = '<div class="empty-state">💬 暂无消息</div>';
                    return;
                }
                
                // 反转消息顺序，最新的显示在最下面
                const reversedMsgs = [...msgs].reverse();
                
                container.innerHTML = reversedMsgs.map(m => `
                    <div class="message-bubble ${m.type}">
                        <div>${escapeHtml(m.content)}</div>
                        <div class="message-time">${formatTime(m.created_at)}</div>
                    </div>
                `).join('');
                
                // 滚动到最底部（最新消息）
                container.scrollTop = container.scrollHeight;
            } catch (e) {
                console.error('加载消息失败:', e);
            }
        }
        
        async function deleteContact(id) {
            if (!confirm('确定删除此联系人？')) return;
            try {
                await fetch(`/api/contacts/${id}`, { method: 'DELETE' });
                if (selectedContact?.id === id) selectedContact = null;
                loadContacts();
            } catch (e) {
                alert('删除失败');
            }
        }
        
        function toggleContactEdit(id) {
            const form = document.getElementById('contact-edit-form');
            if (form) {
                form.classList.toggle('hidden');
            }
        }
        
        function editContact(id) {
            const c = contacts.find(x => x.id === id);
            if (!c) return;
            document.getElementById('edit-id').value = c.id;
            document.getElementById('edit-name').value = c.display_name || '';
            document.getElementById('edit-agent').value = c.agent_name || '';
            document.getElementById('edit-user').value = c.user_name || '';
            document.getElementById('edit-mykey').value = c.my_api_key || c.api_key || '';
            document.getElementById('edit-theirkey').value = c.their_api_key || '';
            document.getElementById('edit-modal').classList.remove('hidden');
        }
        
        function hideEditModal() {
            document.getElementById('edit-modal').classList.add('hidden');
        }
        
        async function confirmEdit() {
            const id = document.getElementById('edit-id').value;
            const data = {
                portal_url: contacts.find(c => c.id == id)?.portal_url || '',
                display_name: document.getElementById('edit-name').value.trim(),
                agent_name: document.getElementById('edit-agent').value.trim(),
                user_name: document.getElementById('edit-user').value.trim(),
                my_api_key: document.getElementById('edit-mykey').value.trim(),
                their_api_key: document.getElementById('edit-theirkey').value.trim()
            };
            try {
                await fetch(`/api/contacts/${id}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                hideEditModal();
                loadContacts();
                if (selectedContact?.id == id) selectContact(parseInt(id));
            } catch (e) {
                alert('更新失败');
            }
        }
        
        async function loadMyInfo() {
            try {
                const res = await fetch('/api/portal/info');
                const data = await res.json();
                document.getElementById('my-url').textContent = data.url || window.location.origin;
                
                // 加载 OpenClaw 配置
                if (data.openclaw_url) {
                    document.getElementById('openclaw-url').value = data.openclaw_url;
                }
                if (data.openclaw_token) {
                    document.getElementById('openclaw-token').value = data.openclaw_token;
                }
            } catch (e) {
                document.getElementById('my-url').textContent = window.location.origin;
            }
        }
        
        async function saveOpenClawConfig() {
            const url = document.getElementById('openclaw-url').value.trim();
            const token = document.getElementById('openclaw-token').value.trim();
            
            try {
                const res = await fetch('/api/config/openclaw', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url, token})
                });
                
                if (res.ok) {
                    document.getElementById('openclaw-status').innerHTML = '<span style="color: #4caf50;">✅ 配置已保存</span>';
                } else {
                    document.getElementById('openclaw-status').innerHTML = '<span style="color: #f44336;">❌ 保存失败</span>';
                }
            } catch (e) {
                document.getElementById('openclaw-status').innerHTML = '<span style="color: #f44336;">❌ 保存失败: ' + e.message + '</span>';
            }
        }
        
        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => alert('📋 已复制'));
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatTime(timeStr) {
            if (!timeStr) return '';
            return new Date(timeStr).toLocaleString('zh-CN');
        }
    </script>
</body>
</html>
